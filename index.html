<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gachiakuta</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/normalize.css">
</head>
<body>

    <nav class="title-bar">
        <div class="title-icons">
            <img src="content/Images/minimize_menu.png" alt="minus icon">
            <img src="content/Images/close_menu.png" alt="close icon">
        </div>
    </nav>

    <div class="heading">
        <h1>To-do list!</h1> <!--make sure to capitilize-->
        <img id="characterIcon" src="content/Images/Rudo/rudo_main.png" alt="red overlay image of rudo happy">
        <div class="arrows" id="charcterselectionArrows">            
            <img id="leftArrow" src="content/Images/Rudo/arroveL_Rudo.png" alt="arrow facing the left"> <!--make sure to switch it-->
            <img id="rightArrow" src="content/Images/Rudo/arrove_Rudo.png" alt="arrow facing the right">
        </div>
    </div>

    <div class="input-field">
        <input type="text" id="inputBox" placeholder="Enter yer task">
        <button id="addTask"> 
            <img src="content/Images/Rudo/plus_rudo.png" alt="light pink plus sign">
        </button>
    </div>

    <div class="task-added" id="taskList">
        <ul id="indivTask" class="task">
            <li>Task 1</li>
            <span>x</span>
        </ul>
        <ul class="task">
            <li>Task 2</li>
            <span>x</span>
        </ul>
        <ul class="task">
            <li>Task 1</li>
            <span>x</span> <!--delte-->
        </ul>
    </div>
    
</body>
</html>
